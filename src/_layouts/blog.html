<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link rel="stylesheet" href="/assets/styles/style.css">
</head>
<body>
        {% include header.html %}
        <div class="container">
        <main>
            {{ content }}

            <nav>
  {% if page.next %}
    <a href="{{ page.next.url }}">Newer: {{ page.next.title }} →</a>
  {% endif %}

  {% if page.previous %}
    <a href="{{ page.previous.url }}">← Older: {{ page.previous.title }}</a>
  {% endif %}
</nav>
        </main>
        </div>
        {% include footer.html %}


    <script src="/assets/scripts/navtoggle.js"></script>
</body>
</html>
