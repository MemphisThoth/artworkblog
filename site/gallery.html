        <div class="gallery">

    <!-- 
      HOW TO USE:
      Replace the placeholder divs with <img> tags pointing to your image files.

      Example:
        <img src="your-image.jpg" alt="Painting name" />

      Or if your images are in a subfolder:
        <img src="images/sunset.jpg" alt="Golden Sunset" />
    -->

    <div class="card">
      <div class="card-img-wrap">
        <!-- Replace with: <img src="your-image.jpg" alt="Golden Sunset" /> -->
         <img src="assets/images/gallery/ocean_wave_scaled.jpg" alt="Ocean Wave">
      </div>
      <div class="card-info">
        <div class="card-name">Ocean Wave</div>
        <div class="card-type">Oil on Canvas</div>
      </div>
    </div>

    <div class="card">
      <div class="card-img-wrap">
        <img src="assets/images/gallery/rocking_chairs_scaled.jpg" alt="Rocking chairs before landscape">
      </div>
      <div class="card-info">
        <div class="card-name">Rocking Chairs</div>
        <div class="card-type">Oil on Canvas</div>
      </div>
    </div>

    <div class="card">
      <div class="card-img-wrap">
        <img src="assets/images/gallery/snowman_scaled.jpg" alt="Snowman in front of house">
      </div>
      <div class="card-info">
        <div class="card-name">Snowman</div>
