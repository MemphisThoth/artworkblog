<head>

    <link rel="stylesheet" href="/assets/styles/style.css">
</head>
<body>

        <header class="site-header">
    <div class="nav-container">
        <a href="/" class="logo">Jared’s Art Blog</a>

        <nav class="site-nav">
            <a href="/" class="nav-link">Home</a>
            <a href="/gallery" class="nav-link">Gallery</a>

</header>
        <main>
            <form action="https://api.web3forms.com/submit" method="post" id="contact">

                <input type="hidden" name="access_key" value="0d1dc04a-654f-4663-bbd1-0d40c2908f0c">
                <input type="hidden" name="subject" value="New Submission from Web3Forms">
                <input type="hidden" name="redirect" value="https://jaredsartblog.net/success.html">

                <h3>Contact Me</h3>
                <fieldset>
                    <input placeholder="Your name" name="name" type="text" required>
                </fieldset>
                <fieldset>
                    <input placeholder="Your Email Address" name="email" type="email" required>
                </fieldset>
                <fieldset>
                    <textarea placeholder="Type your message here..." name="message"></textarea>
                </fieldset>
                <div class="h-captcha" data-captcha="true"></div>
                <fieldset>
                    <button name="submit" type="submit" id="contact-submit">Submit</button>
                </fieldset>
            </form>
        </main>
